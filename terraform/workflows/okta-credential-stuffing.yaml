version: '1'
name: Okta Credential Stuffing Response
enabled: true
description: >-
  Triggered by the Okta credential stuffing detection rule. Creates a Security Case,
  sets it in-progress, attaches the triggering alert, pins the attacker IP and
  compromised account as observables, adds an analysis comment, runs the
  remediate-okta-compromise runscript against the Windows endpoint, then closes the case.

triggers:
  - type: alert

inputs:
  - name: endpoint_id
    type: string
    default: "7cc77f9a-35ac-48b0-ad3a-ec309c8cd257"
  - name: script_id
    type: string
    default: "REPLACE_WITH_SCRIPT_LIBRARY_UUID"

steps:
  # ============================================================================
  # STEP 1: Open a case
  # ============================================================================
  - name: create_case
    type: cases.createCase
    with:
      owner: securitySolution
      title: "Okta Account Takeover: {{ event.alerts[0]['user.name'] | default: 'Unknown User' }}"
      description: |
        Credential stuffing attack detected. The same user and source IP completed the full
        four-stage sequence: failed logins (INVALID_CREDENTIALS) → MFA failures →
        successful login → post-compromise action (privilege grant or policy update).

        **Source IP:** {{ event.alerts[0]['source.ip'] | default: 'Unknown' }}
        **Compromised account:** {{ event.alerts[0]['user.name'] | default: 'Unknown' }}

        Automated remediation is underway. See case comments for details.
      severity: critical
      tags:
        - okta
        - credential-stuffing
        - account-takeover
        - T1110.004
        - T1078
        - T1098
        - automated

  # ============================================================================
  # STEP 2: Mark in-progress — signals remediation is running
  # ============================================================================
  - name: set_in_progress
    type: cases.setStatus
    with:
      case_id: "{{ steps.create_case.output.case.id }}"
      status: in-progress

  # ============================================================================
  # STEP 3: Attach the triggering alert
  # ============================================================================
  - name: attach_alert
    type: cases.addAlerts
    with:
      case_id: "{{ steps.create_case.output.case.id }}"
      alerts:
        - alertId: "{{ event.alerts[0]['_id'] }}"
          index: "{{ event.alerts[0]['_index'] }}"

  # ============================================================================
  # STEP 4: Pin attacker IP and compromised account as observables (IOCs)
  # ============================================================================
  - name: add_observables
    type: cases.addObservables
    with:
      case_id: "{{ steps.create_case.output.case.id }}"
      observables:
        - typeKey: observable-type-ipv4
          value: "{{ event.alerts[0]['source.ip'] }}"
          description: "Attacker IP — credential stuffing source"
        - typeKey: observable-type-email
          value: "{{ event.alerts[0]['user.name'] }}"
          description: "Compromised Okta account"

  # ============================================================================
  # STEP 5: AI-generated analysis comment
  # ============================================================================
  - name: ai_analysis
    type: ai.prompt
    connector-id: Anthropic-Claude-Sonnet-4-6
    with:
      prompt: >-
        You are a security analyst. Analyze the following Okta credential stuffing alert
        and produce a concise case comment for the security team.

        **Alert data:**
        {{ event.alerts | json }}

        **Attack stages detected:**
        - Failed logins (INVALID_CREDENTIALS): {{ event.alerts[0]['failed_logins'] | default: 'unknown' }}
        - MFA failures: {{ event.alerts[0]['mfa_failures'] | default: 'unknown' }}
        - Successful logins: {{ event.alerts[0]['successful_logins'] | default: 'unknown' }}
        - Post-compromise events: {{ event.alerts[0]['post_compromise_events'] | default: 'unknown' }}

        Include in your analysis:
        1. A summary of the credential stuffing attack and what the four stages indicate.
        2. The compromised account and attacker IP, and what the post-compromise activity suggests.
        3. Severity assessment.
        4. Recommended next steps beyond the automated remediation already underway.

        Format the output as a readable case comment in Markdown. Be concise.

  - name: analysis_comment
    type: cases.addComment
    with:
      case_id: "{{ steps.create_case.output.case.id }}"
      comment: "## AI Analysis\n\n{{ steps.ai_analysis.output.content }}"

  # ============================================================================
  # STEP 6: Run the remediation script against the Windows endpoint
  # ============================================================================
  - name: remediate
    type: kibana.request
    with:
      method: POST
      path: /api/endpoint/action/run_script
      body:
        alert_ids:
          - "{{ event.alerts[0]._id }}"
        agent_type: endpoint
        endpoint_ids:
          - "{{ inputs.endpoint_id }}"
        parameters:
          scriptId: "{{ inputs.script_id }}"
          scriptInput: "-SourceIP {{ event.alerts[0]['source.ip'] }} -CompromisedUser {{ event.alerts[0]['user.name'] }}"
        comment: "Triggered by workflow '{{ workflow.name }}'"

  # ============================================================================
  # STEP 7: Remediation summary comment
  # ============================================================================
  - name: remediation_comment
    type: cases.addComment
    with:
      case_id: "{{ steps.create_case.output.case.id }}"
      comment: |
        ## Automated Remediation Complete

        `remediate-okta-compromise.ps1` ran against the enrolled Windows endpoint:

        - Blocked `{{ event.alerts[0]['source.ip'] }}` at the Windows Firewall (inbound + outbound)
        - Disabled local account `{{ event.alerts[0]['user.name'] | split: '@' | first }}`

        Script output:
        ```
        {{ steps.remediate.output | default: 'No output captured' }}
        ```

  # ============================================================================
  # STEP 8: Close the case — remediation complete
  # ============================================================================
  - name: close_case
    type: cases.setStatus
    with:
      case_id: "{{ steps.create_case.output.case.id }}"
      status: closed
